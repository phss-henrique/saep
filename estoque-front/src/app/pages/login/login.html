<div class="flex items-center justify-center min-h-screen bg-base-200">
  <div class="card w-96 bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title justify-center text-2xl font-bold mb-4">Login do Sistema</h2>
      
      <div class="form-control w-full max-w-xs">
        <label class="label"><span class="label-text">E-mail</span></label>
        <input type="email" [(ngModel)]="email" placeholder="pedro@email.com" class="input input-bordered w-full max-w-xs" />
      </div>

      <div class="form-control w-full max-w-xs mt-2">
        <label class="label"><span class="label-text">Senha</span></label>
        <input type="password" [(ngModel)]="senha" placeholder="••••••••" class="input input-bordered w-full max-w-xs" />
      </div>

      <div class="card-actions justify-end mt-6">
        <button class="btn btn-primary w-full" (click)="fazerLogin()">Entrar</button>
      </div>
    </div>
  </div>
</div>
